name: Deploy to GitHub Pages

# dist/ 폴더(미리 빌드된 정적 사이트)를 GitHub Pages로 배포한다.
# 저장소 Settings → Pages → Source 를 "GitHub Actions" 로 설정하면 활성화된다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # Pages가 아직 없으면 액션이 직접 활성화
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
